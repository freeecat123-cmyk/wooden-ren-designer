name: Geometry Audit

on:
  push:
    branches: [main]
    paths:
      - "lib/templates/**"
      - "lib/geometry/**"
      - "lib/joinery/**"
      - "lib/render/geometry.ts"
      - "scripts/audit-overlaps.ts"
      - "scripts/audit-joints.ts"
      - "lib/types/index.ts"
  pull_request:
    paths:
      - "lib/templates/**"
      - "lib/geometry/**"
      - "lib/joinery/**"
      - "lib/render/geometry.ts"
      - "scripts/audit-overlaps.ts"
      - "scripts/audit-joints.ts"
      - "lib/types/index.ts"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run overlap + joint audits
        run: npm run audit
